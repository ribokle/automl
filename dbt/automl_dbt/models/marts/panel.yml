version: 2

models:
  - name: panel
    description: "Canonical weekly SKU x store panel ready for modeling agents."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [sku, week_start, store_id]
    columns:
      - name: discount_depth
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -0.05
              max_value: 1.0
              config:
                severity: warn
